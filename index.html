<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Fantasy Name Generator</title>
	<style>
		html {height: 100%}
		body {width: 575px; margin: 0 auto; position: relative; font-family: sans-serif}
		select {height: 1.65em}
		.nametype {flex-grow: 1}
		.namelist {display: none}
		#output:not([data-generator^="descriptions$"]) {text-transform: capitalize}
	</style>
</head>
<body>
	<header>
		<h1>Fantasy Name Generator</h1>
	</header>
	<main>
		<p>
			<form action="javascript:generate();" style="display: flex;">
				<select class="nametype" id="nametype">
					<option>Loading generators...</option>
				</select>
				<input type="number" id="quantity" min="0" max="1000" value="10" />
				<input type="submit" value="Generate" />
			</form>
		</p>
		<p id="output"></p>
	</main>
</body>
	<script src="//cdnjs.cloudflare.com/ajax/libs/seedrandom/2.4.0/lib/xor4096.min.js"></script>
	<script src="scripts/load.js"></script>
	<script src="scripts/cookie.js"></script>
	<script src="scripts/script.js"></script>
</html>
